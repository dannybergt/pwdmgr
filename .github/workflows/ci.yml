name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore backend
        run: dotnet restore pwdmgr.slnx
      - name: Build backend
        run: dotnet build pwdmgr.slnx --configuration Release --no-restore

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install frontend
        working-directory: src/frontend
        run: npm install
      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

